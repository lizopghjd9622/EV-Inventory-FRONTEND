server {
    listen       80;
    server_name  ev-inventory.sdd.asia;  # 替换为你的域名或服务器 IP

    # 静态资源目录（npm run build:h5 产物位于 dist/h5/）
    root   /var/www/ev-inventory/dist/h5/;  # 替换为实际路径
    index  index.html;

    # Gzip 压缩，减小传输体积
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;

    # 静态资源强缓存（带 hash 的文件）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理 → 后端服务
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;  # 替换为真实后端地址（末尾保留 /）
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / 流式响应：禁用缓冲，确保实时推送
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        proxy_connect_timeout  10s;
        chunked_transfer_encoding on;
    }

    # H5 SPA 路由：所有未匹配路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全相关 HTTP 响应头
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
}
